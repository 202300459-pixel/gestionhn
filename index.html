<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GestiónHN · Sistema Comercial</title>
<meta name="theme-color" content="#0F1923">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0F1923;--surface:#162030;--raised:#1E2D40;--border:#2A3D52;--border-lit:#3D5870;
  --amber:#F5A623;--amber-g:rgba(245,166,35,.15);
  --green:#2ECC71;--red:#E74C3C;--blue:#3498DB;
  --t1:#E8EDF2;--t2:#8FA3B8;--t3:#4A6478;
}
html,body{height:100%;font-family:'Epilogue',sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden}

/* FONDO */
.bg-grid{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(42,61,82,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(42,61,82,.3) 1px,transparent 1px);
  background-size:44px 44px;animation:bgDrift 25s linear infinite}
@keyframes bgDrift{from{background-position:0 0}to{background-position:44px 44px}}
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 65% 45% at 50% -5%,rgba(245,166,35,.08),transparent),
             radial-gradient(ellipse 45% 55% at 90% 90%,rgba(52,152,219,.05),transparent)}

/* LAYOUT */
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}

/* BADGE */
.status-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.25);border-radius:20px;padding:5px 15px;font-size:11px;font-weight:600;color:var(--green);margin-bottom:32px;letter-spacing:.3px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LOGO */
.logo-wrap{margin-bottom:22px;position:relative;display:inline-block}
.logo-ring{position:absolute;inset:-10px;border-radius:32px;border:1.5px solid rgba(245,166,35,.18);animation:ringPulse 3s ease-in-out infinite}
@keyframes ringPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.15;transform:scale(1.04)}}
.logo{width:84px;height:84px;background:linear-gradient(135deg,#F5A623,#B8720D);border-radius:24px;display:inline-flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 0 60px rgba(245,166,35,.28),0 10px 40px rgba(0,0,0,.5);animation:logoFloat 3.5s ease-in-out infinite}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

/* BRAND */
.brand{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;letter-spacing:-1.5px;margin-bottom:7px;background:linear-gradient(135deg,#fff 35%,var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-size:13px;color:var(--t3);margin-bottom:44px;letter-spacing:.4px}

/* CARDS */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:460px;margin-bottom:20px}
.card{position:relative;border-radius:20px;padding:26px 20px 22px;text-decoration:none;color:inherit;cursor:pointer;transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s;overflow:hidden;display:block}
.card:hover{transform:translateY(-5px) scale(1.025)}
.card:active{transform:scale(.96)}

.card-caja{background:linear-gradient(140deg,#C07D0F 0%,#F5A623 60%,#FFB83D 100%);box-shadow:0 10px 40px rgba(245,166,35,.32),0 2px 8px rgba(0,0,0,.3)}
.card-caja::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent 60%);pointer-events:none}
.card-caja::after{content:'🖥️';position:absolute;right:-8px;bottom:-12px;font-size:72px;opacity:.08;pointer-events:none}
.card-caja .card-icon{font-size:34px;margin-bottom:11px;display:block;filter:drop-shadow(0 2px 6px rgba(0,0,0,.2))}
.card-caja .card-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#0F1923;margin-bottom:4px}
.card-caja .card-sub{font-size:11px;color:rgba(15,25,35,.55);font-weight:600;letter-spacing:.2px}
.card-caja .card-arrow{position:absolute;top:14px;right:14px;width:26px;height:26px;background:rgba(15,25,35,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(15,25,35,.6)}

.card-admin{background:var(--surface);border:1px solid var(--border-lit);box-shadow:0 10px 40px rgba(0,0,0,.35)}
.card-admin::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(245,166,35,.55),transparent)}
.card-admin::after{content:'👑';position:absolute;right:-8px;bottom:-12px;font-size:72px;opacity:.06;pointer-events:none}
.card-admin .card-icon{font-size:34px;margin-bottom:11px;display:block}
.card-admin .card-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--t1);margin-bottom:4px}
.card-admin .card-sub{font-size:11px;color:var(--t3);font-weight:600;letter-spacing:.2px}
.card-admin .card-arrow{position:absolute;top:14px;right:14px;width:26px;height:26px;background:var(--raised);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--t3);border:1px solid var(--border)}
.card-admin:hover .card-arrow{color:var(--amber);border-color:rgba(245,166,35,.35)}
.card-admin:hover{border-color:rgba(245,166,35,.3);box-shadow:0 10px 40px rgba(245,166,35,.1)}

/* STATS */
.stats-box{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:22px;display:grid;grid-template-columns:1fr 1fr 1fr}
.stat{padding:16px 10px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--amber);margin-bottom:3px;transition:all .3s}
.stat-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t3)}

/* CLOUD BAR */
.cloud-row{width:100%;max-width:460px;display:flex;align-items:center;gap:9px;font-size:11px;color:var(--t3);margin-bottom:24px}
.cloud-bar{flex:1;height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.cloud-bar-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--green));width:0%;transition:width 1.8s ease;border-radius:3px}

/* FOOTER */
.footer{font-size:10px;color:var(--t3);letter-spacing:.5px;text-align:center}

/* LOADING */
#lov{position:fixed;inset:0;background:var(--bg);z-index:99;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .5s}
#lov.gone{opacity:0;pointer-events:none}
.spin{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:420px){
  .brand{font-size:32px}
  .cards{grid-template-columns:1fr;max-width:300px}
  .stats-box{max-width:300px}
  .cloud-row{max-width:300px}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="lov">
  <div style="width:68px;height:68px;background:linear-gradient(135deg,#F5A623,#B8720D);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 0 50px rgba(245,166,35,.3)">⚡</div>
  <div class="spin"></div>
  <div style="font-size:13px;color:var(--t3)" id="load-txt">Conectando con Firebase...</div>
</div>

<!-- Fondo -->
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="wrap">

  <div class="status-badge">
    <span class="status-dot"></span>
    <span id="status-txt">Verificando sistema...</span>
  </div>

  <div class="logo-wrap">
    <div class="logo-ring"></div>
    <div class="logo">⚡</div>
  </div>

  <div class="brand">GestiónHN</div>
  <div class="tagline">Sistema Comercial · Honduras 🇭🇳</div>

  <div class="cards">
    <a href="https://202300459-pixel.github.io/gestionhn/caja_nube.html" class="card card-caja">
      <div class="card-arrow">→</div>
      <span class="card-icon">🖥️</span>
      <div class="card-title">Caja</div>
      <div class="card-sub">Punto de Venta · Cajeros</div>
    </a>
    <a href="https://202300459-pixel.github.io/gestionhn/admin_nube.html" class="card card-admin">
      <div class="card-arrow">→</div>
      <span class="card-icon">👑</span>
      <div class="card-title">Admin</div>
      <div class="card-sub">Panel · Solo Admins</div>
    </a>
  </div>

  <div class="stats-box">
    <div class="stat"><div class="stat-val" id="stat-ventas">—</div><div class="stat-lbl">Ventas Hoy</div></div>
    <div class="stat"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Total Hoy</div></div>
    <div class="stat"><div class="stat-val" id="stat-prods">—</div><div class="stat-lbl">Productos</div></div>
  </div>

  <div class="cloud-row">
    <span id="cloud-lbl">☁️ Firebase</span>
    <div class="cloud-bar"><div class="cloud-bar-fill" id="cbf"></div></div>
    <span id="cloud-pct" style="min-width:32px;text-align:right">0%</span>
  </div>

  <div class="footer">GestiónHN · v2.0 · <span id="fdate"></span></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBJVCajgig6zltViQdfSzbpN8RFlItauyw",
  authDomain: "gestionhn.firebaseapp.com",
  projectId: "gestionhn",
  storageBucket: "gestionhn.firebasestorage.app",
  messagingSenderId: "919247505233",
  appId: "1:919247505233:web:c654ca7eeb2b5ff0233570",
  measurementId: "G-S05563XLXS"
};

const L = n => 'L ' + ((+n)||0).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const today = () => new Date().toISOString().slice(0,10);

let pct=0;
const pi=setInterval(()=>{
  pct=Math.min(pct+Math.random()*15,88);
  document.getElementById('cbf').style.width=pct+'%';
  document.getElementById('cloud-pct').textContent=Math.round(pct)+'%';
},200);

async function init(){
  document.getElementById('fdate').textContent=new Date().toLocaleDateString('es-HN',{day:'2-digit',month:'short',year:'numeric'});
  let ok=false;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    const db=firebase.firestore();
    ok=true;
    document.getElementById('load-txt').textContent='Cargando datos...';
    try{
      const [dv,dp]=await Promise.all([
        db.collection('gestionhn').doc('hn_ventas').get(),
        db.collection('gestionhn').doc('hn_productos').get()
      ]);
      if(dv.exists){
        const vs=JSON.parse(dv.data().data||'[]');
        const hoy=vs.filter(v=>v.fecha===today()&&!v.anulada);
        document.getElementById('stat-ventas').textContent=hoy.length;
        document.getElementById('stat-total').textContent=L(hoy.reduce((s,v)=>s+v.total,0));
      } else { localStats(); }
      if(dp.exists){
        const ps=JSON.parse(dp.data().data||'[]');
        document.getElementById('stat-prods').textContent=ps.length;
      }
    }catch(e){localStats();}
  }catch(e){ok=false;localStats();}

  clearInterval(pi);
  document.getElementById('cbf').style.width='100%';
  document.getElementById('cloud-pct').textContent='100%';

  if(ok){
    document.getElementById('cloud-lbl').textContent='✅ Firebase OK';
    document.getElementById('cloud-lbl').style.color='var(--green)';
    document.getElementById('status-txt').textContent='Sistema activo · nube sincronizada';
  } else {
    document.getElementById('cloud-lbl').textContent='📱 Modo local';
    document.getElementById('status-txt').textContent='Sin conexión a nube';
  }
  setTimeout(()=>document.getElementById('lov').classList.add('gone'),350);
}

function localStats(){
  try{
    const vs=JSON.parse(localStorage.getItem('hn_ventas')||'[]');
    const hoy=vs.filter(v=>v.fecha===today()&&!v.anulada);
    document.getElementById('stat-ventas').textContent=hoy.length;
    document.getElementById('stat-total').textContent=L(hoy.reduce((s,v)=>s+v.total,0));
    const ps=JSON.parse(localStorage.getItem('hn_productos')||'[]');
    document.getElementById('stat-prods').textContent=ps.length||'—';
  }catch(e){}
}

init();
</script>
</body>
</html>
