<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GestiónHN · Cargando...</title>
<meta name="theme-color" content="#0F1923">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Epilogue',sans-serif;background:#0F1923;color:#E8EDF2;height:100vh;display:flex;align-items:center;justify-content:center}
.splash{text-align:center}
.logo{width:64px;height:64px;background:#F5A623;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px;box-shadow:0 0 40px rgba(245,166,35,.3)}
h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:6px}
p{font-size:13px;color:#4A6478;margin-bottom:24px}
.spinner{width:40px;height:40px;border:3px solid #2A3D52;border-top-color:#F5A623;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.links{margin-top:28px;display:flex;gap:12px;justify-content:center}
a{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;transition:all .15s}
.a-caja{background:#F5A623;color:#0F1923}
.a-caja:hover{background:#FFB83D}
.a-admin{background:#1E2D40;color:#8FA3B8;border:1px solid #2A3D52}
.a-admin:hover{background:#253649;color:#E8EDF2}
</style>
</head>
<body>
<div class="splash">
  <div class="logo">⚡</div>
  <h1>GestiónHN</h1>
  <p>Sistema Comercial · Honduras</p>
  <div class="spinner"></div>
  <div class="links">
    <a href="caja.html" class="a-caja">🖥️ Ir a Caja</a>
    <a href="admin.html" class="a-admin">👑 Administrador</a>
  </div>
</div>
</body>
</html>
